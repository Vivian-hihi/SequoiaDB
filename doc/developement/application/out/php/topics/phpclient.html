  <h1 class="title topictitle1">php客户端</h1>

  <div class="body">
    <p class="p">PHP驱动主要提供了数据库的连接，数据的增删改查，索引的创建删除，以及集合与集合空间的创建删除操作。</p>

    <div class="section"><h2 class="title sectiontitle">对象</h2>
      
      <p class="p">PHP驱动并不需要用户去关心数据库是如何工作的，用户只需要创建一个sequoiadb类的对象，就能够对数据库进行操作了。</p>

    </div>

    <div class="section"><h2 class="title sectiontitle">错误信息</h2>
      
      <p class="p">1.大部分函数的返回值为布尔类型。</p>

      <p class="p">2.如果一个函数被成功调用则返回true(或整型1)，否则返回值为false(或整型0)。</p>

      <p class="p">3.如果用户需要知道详细的错误信息，可以调用getError()获取错误信息，如果没有错误，则会输出"No error message"</p>

    </div>

  </div>
