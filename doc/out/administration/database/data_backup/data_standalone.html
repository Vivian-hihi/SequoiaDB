  <h1 class="title topictitle1">独立模式</h1>

  <div class="body">
    <p class="p">独立模式下，用户必须完全停止数据库后，才能将数据库目录与索引目录中的所有文件归档。 </p>

    <p class="p">在指定配置文件的情况下，数据库目录与索引目录为配置文件中的dbpath与indexpath所制定的目录。默认情况下indexpath与dbpath相同。</p>

    <p class="p">在配置文件不存在的情况下，数据库目录为启动数据库时所指定的目录。 </p>

  </div>
