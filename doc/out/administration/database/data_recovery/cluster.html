  <h1 class="title topictitle1">集群模式</h1>

  <div class="body">
    <p class="p">集群模式下，用户需要停止被恢复的分片组，并将分片组中每一个数据节点的配置与数据文件进行恢复在进行数据恢复的过程中，用户必须完全停止被恢复的分片组（停止分片组中所有的数据节点），并确保：</p>

    <p class="p">1）分片组中的每个节点使用同样的备份文件恢复 </p>

    <p class="p">2）删除分片组中每个节点的日志文件 </p>
