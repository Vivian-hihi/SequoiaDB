  <h1 class="title topictitle1">数据恢复</h1>

  <div class="body">
    <p class="p">数据恢复操作是用户在之前所进行的数据备份文件，将节点状态恢复到某一时刻点。 </p>

    <p class="p">在进行恢复操作时，应避免使用任何元数据更改的操作，例如创建集合、删除集合、数据切分、增减数据节点等操作。 </p>

    <p class="p">如果在数据备份后对元数据进行了更改，数据恢复有可能造成数据不一致或数据损坏。用户需要手工验证数据恢复后的完整性。 </p>

    <p class="p"><a class="xref" href="standalone.html">独立模式</a></p>

    <p class="p"><a class="xref" href="cluster.html">集群模式</a></p>

    <p class="p"><a class="xref" href="sample.html">例程</a></p>
