<!DOCTYPE html>
<html>
	<head>
		<title>SequoiaDB Administration Center</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
		<script type="text/javascript" src="../../../js/lib/l.js"></script>
	</head>
	<body>
		<div id="operate" style="margin-top:15px;">
            <table class="ext-table ext-loosen">
                <tbody>
                    <tr>
                        <td style="width: 80px;">IP / HostName:</td>
                        <td style="width: 314px;">
                            <textarea class="form-control" id="hostSearchAddress" rows="3"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td style="width: 80px;">Master Port:</td>
                        <td><input class="form-control" type="text" id="hostSearchUser" value="root" disabled=""></td>
                    </tr>
                    <tr>
                        <td style="width: 80px;">Web Port:</td>
                        <td><input class="form-control" type="password" id="hostSearchPasswd"></td>
                    </tr>
                    <tr>
                        <td colspan="2" style="text-align: right;">
                            <button class="ext-btn ext-btn-primary" onclick="searchHostList()">添加</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
	</body>
</html>
