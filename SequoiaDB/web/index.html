<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
   <meta charset="utf-8">
   <title>SequoiaDB</title>
   <link rel="stylesheet" media="all" href="./style/sdbcss.css">
   <link rel="stylesheet" media="all" href="./images/icon/css/font-awesome.css">
   <!--[if IE]><meta http-equiv="X-UA-Compatible" content="IE=edge" /><![endif]-->
   <!--[if lte IE 7]>
      <link rel="stylesheet" media="all" href="./images/icon/css/font-awesome-ie7.min.css">
      <script src="./scripts/angular/angular.ie7.js"></script>
   <![endif]-->
   <!--[if gt IE 7]>
      <script src="./scripts/angular/angular.js"></script>
   <![endif]-->
   <!--[if !IE]><!-->
      <script src="./scripts/angular/angular.js"></script>
   <!--<![endif]-->
   <!--[if lte IE 8]>
      <script src="./scripts/json/json2.js"></script>
   <![endif]-->
   <script src="./scripts/angular/angular-route.min.js"></script>
   <script src="./scripts/jquery/jquery-1.11.1.min.js"></script>
   <script src="./scripts/jquery/jquery.cookie.js"></script>
   <script src="./scripts/jquery/jquery.md5.js"></script>
   <script src="./scripts/echarts/echarts-all.js"></script>
   <script src="./scripts/raphael/raphael.js"></script>
   <script src="./app/other/lib/function.js"></script>
   <script src="./app/other/lib/private.js"></script>
   <script src="./app/app.js"></script>
   <script src="./app/config/Route.js"></script>
   <script src="./app/config/RouteProvider.js"></script>
   <script src="./app/config/echart.js"></script>
   <script src="./app/config/Operate.js"></script>
   <script src="./app/service/Function.js"></script>
   <script src="./app/service/Rest.js"></script>
   <script src="./app/service/Cylinder.js"></script>
   <script src="./app/service/InheritSize.js"></script>
   <script src="./app/service/Components.js"></script>
   <script src="./app/directive/Public.js"></script>
   <script src="./app/directive/directive.js"></script>
   <script src="./app/controller/Public.js"></script>
</head>
<body id="ng-app" ng-app="sacApp" ng-cloak>

   <div id="PublicLayout" ng-controller="Index.Ctrl" inherit-size>

      <div id="PublicTop" data-height="40">
         <div ng-include="Templates.Top"></div>
      </div>

      <div class="relativeBox" data-offsetY="-40">
         <div id="PublicLeft" class="absoluteLeftBox" data-width="260">
            <div ng-include="Templates.Left" inherit-size></div>
         </div>

         <div id="PublicCentre" data-offsetX="-260" data-mLeft="260">

            <div style="background-color:#5B5B6B;" data-height="2"></div>
            <div class="relativeBox" data-offsetY="-42">
               <div style="height:100%;zoom:1;" ng-view></div>
            </div>
            <div id="PublicBottom" data-height="40">
               <div ng-include="Templates.Bottom"></div>
            </div>

         </div>
      </div>
      <div data-height="0" create-modal para="Components.Modal"></div>
      <div data-height="0" create-confirm para="Components.Confirm"></div>
   </div>
</body>
</html>
